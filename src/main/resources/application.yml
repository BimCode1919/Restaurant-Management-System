spring:
  application:
    name: restaurant-qr-order

  flyway:
    baseline-on-migrate: true

  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_qr_db
    username: restaurant_user #postgres
    password: restaurant_pass #123456
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true  # Critical for existing databases
    baseline-version: 0  # Optional: version number for the baseline
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: MySecretKeyForRestaurantQROrderSystemMinimum256BitsLongForHS256Algorithm
    expiration: 86400000
    refresh-expiration: 604800000


  qr:
    base-url: http://localhost:3000
    image-path: ./qr-codes/

  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080

  file:
    upload-dir: ./uploads/
    max-size: 10485760

# MoMo Payment Gateway Configuration
momo:
  partner-code: ${MOMO_PARTNER_CODE:MOMO_PARTNER_CODE}
  access-key: ${MOMO_ACCESS_KEY:MOMO_ACCESS_KEY}
  secret-key: ${MOMO_SECRET_KEY:MOMO_SECRET_KEY}
  endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
  return-url: ${MOMO_RETURN_URL:http://localhost:8080/api/payments/momo/return}
  notify-url: ${MOMO_NOTIFY_URL:http://localhost:8080/api/payments/momo/notify}

logging:
  level:
    root: INFO
    com.restaurant.qrorder: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

